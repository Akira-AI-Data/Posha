name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment each upload)'
        required: true
        default: '1'
      version_name:
        description: 'Version name shown to users (e.g. 1.0.1)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor plugins to Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/posha-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=../keystore/posha-release.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Set version in build.gradle
        working-directory: android
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" app/build.gradle
          sed -i 's/versionName "[^"]*"/versionName "${{ github.event.inputs.version_name }}"/' app/build.gradle

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: posha-${{ github.event.inputs.version_name }}-(${{ github.event.inputs.version_code }}).aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
